<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống thi Tin học</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg,#84fab0,#8fd3f4);
    text-align:center;
}

.container {
    width:85%;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px gray;
}

h2 { color:#ff6f61; }

.question {
    text-align:left;
    padding:10px;
    margin:10px;
    background:#f1f3f5;
    border-radius:10px;
    transition:0.3s;
}

.question:hover {
    background:#ffe066;
    transform:scale(1.02);
}

button {
    padding:10px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

button:hover {
    background:orange;
    transform:scale(1.1);
}

ul { text-align:left; }

#timer {
    color:red;
    font-weight:bold;
    font-size:20px;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>

// ================= LOGIN =================
function loginUI(){
document.getElementById("app").innerHTML = `
<h2>🎓 Đăng nhập</h2>
<input id="name" placeholder="Họ tên"><br><br>

<select id="grade">
<option value="3">Lớp 3</option>
<option value="4">Lớp 4</option>
<option value="5">Lớp 5</option>
</select><br><br>

<button onclick="startExam()">🚀 Vào thi</button>
<button onclick="showTeacher()">👩‍🏫 Xem điểm</button>
`;
}

// ================= NGÂN HÀNG (TỪ DOC) =================
const bank = {

3:[
{q:"Máy tính giúp em làm gì?",a:["A. Học bài","B. Ngủ","C. Ăn cơm"],c:"A"},
{q:"Thư mục dùng để làm gì?",a:["A. Chứa tệp tin","B. Nghe nhạc","C. Xem phim"],c:"A"},
{q:"Không nên chia sẻ thông tin cá nhân vì?",a:["A. Nguy hiểm","B. An toàn","C. Bình thường"],c:"A"},
{q:"Đâu là biểu tượng PowerPoint?",a:["A. PPT","B. Word","C. Excel"],c:"A"}
],

4:[
{q:"Scratch dùng để làm gì?",a:["A. Lập trình","B. Nghe nhạc","C. Vẽ"],c:"A"},
{q:"Nút cờ xanh dùng để?",a:["A. Chạy chương trình","B. Tắt","C. Lưu"],c:"A"},
{q:"New Slide dùng để?",a:["A. Thêm trang","B. Xóa","C. Đổi màu"],c:"A"},
{q:"PowerPoint dùng để?",a:["A. Trình chiếu","B. Vẽ","C. Nghe"],c:"A"}
],

5:[
{q:"Cấu trúc tuần tự là gì?",a:["A. Thực hiện theo thứ tự","B. Lặp","C. Chọn"],c:"A"},
{q:"Cấu trúc nếu thì là?",a:["A. Tuần tự","B. Rẽ nhánh","C. Lặp"],c:"B"},
{q:"Chạy thử chương trình để làm gì?",a:["A. Kiểm tra","B. Tìm lỗi","C. Tất cả"],c:"C"},
{q:"Đổi tên thư mục bằng cách nào?",a:["A. Rename","B. Delete","C. Enter"],c:"A"}
]

};

// ================= THI =================
function startExam(){

let name=document.getElementById("name").value;
let grade=document.getElementById("grade").value;

localStorage.setItem("name",name);
localStorage.setItem("grade",grade);

let questions = bank[grade].sort(()=>Math.random()-0.5);

let html = `
<h2>📝 Bài thi lớp ${grade}</h2>
<p id="timer">⏰ 35:00</p>
`;

// ===== TRẮC NGHIỆM =====
questions.forEach((q,i)=>{
html+=`<div class="question">
<p>${i+1}. ${q.q}</p>`;
q.a.forEach(opt=>{
html+=`<input type="radio" name="q${i}" value="${opt[0]}"> ${opt}<br>`;
});
html+=`</div>`;
});

// ===== THỰC HÀNH CHI TIẾT =====
if(grade==3){
html+=`
<h3>🛠 THỰC HÀNH</h3>
<ul>
<li>📁 Tạo thư mục trong ổ D</li>
<li>📊 Mở PowerPoint</li>
<li>Slide 1: Giới thiệu bản thân</li>
<li>Slide 2: Giới thiệu hoa phượng</li>
<li>🖼 Chèn hình ảnh</li>
<li>🔤 Font Arial</li>
<li>💾 Lưu: Gioithieubanthan</li>
</ul>`;
}

if(grade==4){
html+=`
<h3>🛠 THỰC HÀNH</h3>
<ul>
<li>📁 Tạo thư mục Tên em_Lớp 4</li>
<li>🎮 Mở Scratch</li>
<li>🚩 Bấm cờ xanh</li>
<li>💬 Nói “Xin chào các bạn!”</li>
<li>➡ Di chuyển 10 bước</li>
<li>📊 Tạo PowerPoint 3 slide</li>
<li>✨ Thêm hiệu ứng</li>
<li>💾 Lưu bài</li>
</ul>`;
}

if(grade==5){
html+=`
<h3>🛠 THỰC HÀNH</h3>
<ul>
<li>📁 Tạo thư mục Tên em_Lớp 5</li>
<li>🎮 Scratch: nói + di chuyển + xoay</li>
<li>📐 Tính diện tích hình vuông</li>
</ul>

<h3>🧠 TỰ LUẬN</h3>
<p>Tại sao cần chạy thử chương trình?</p>
<textarea id="essay" style="width:100%;height:80px"></textarea>
`;
}

html+=`
<br><input type="file"><br><br>
<button onclick="submitExam()">🚀 Nộp bài</button>
<p id="result"></p>
`;

document.getElementById("app").innerHTML = html;

// ===== TIMER =====
let time=35*60;
let t=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerHTML=`⏰ ${m}:${s<10?"0":""}${s}`;
time--;
if(time<0){
clearInterval(t);
submitExam();
}
},1000);

window.currentQuestions = questions;
}

// ================= CHẤM =================
function submitExam(){

let score=0;

window.currentQuestions.forEach((q,i)=>{
let c=document.querySelector(`input[name="q${i}"]:checked`);
if(c && c.value===q.c) score++;
});

let essay=document.getElementById("essay")?.value || "";
let essayScore = essay.length > 20 ? 2 : 0;

let total = score + essayScore;

// LƯU
let data = JSON.parse(localStorage.getItem("students")||"[]");

data.push({
name:localStorage.getItem("name"),
grade:localStorage.getItem("grade"),
score,
essayScore,
total
});

localStorage.setItem("students",JSON.stringify(data));

document.getElementById("result").innerHTML =
`🎉 Tổng điểm: ${total}`;
}

// ================= GIÁO VIÊN =================
function showTeacher(){

let data = JSON.parse(localStorage.getItem("students")||"[]");

let html = `<h2>📊 Bảng điểm</h2>
<table border="1" width="100%">
<tr><th>Tên</th><th>Lớp</th><th>TN</th><th>TL</th><th>Tổng</th></tr>`;

data.forEach(s=>{
html+=`<tr>
<td>${s.name}</td>
<td>${s.grade}</td>
<td>${s.score}</td>
<td>${s.essayScore}</td>
<td>${s.total}</td>
</tr>`;
});

html+=`</table><br>
<button onclick="loginUI()">⬅ Quay lại</button>`;

document.getElementById("app").innerHTML = html;
}

// START
loginUI();

</script>

</body>
</html>
