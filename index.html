<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi Tin học Tiểu học</title>

<style>
body{
font-family:Arial;
background:linear-gradient(120deg,#a1c4fd,#c2e9fb);
text-align:center;
}

.container{
background:white;
width:90%;
margin:20px auto;
padding:20px;
border-radius:15px;
}

.question{
text-align:left;
margin:10px;
padding:10px;
background:#f8f9fa;
border-radius:10px;
}

button{
padding:10px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{background:orange;}

#timer{color:red;font-weight:bold;font-size:18px;}

ul{text-align:left;}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

// ================= LOGIN =================
function login(){
document.getElementById("app").innerHTML=`
<h2>🎓 Đăng nhập</h2>
<input id="name" placeholder="Họ tên"><br><br>

<select id="grade">
<option value="3">Lớp 3</option>
<option value="4">Lớp 4</option>
<option value="5">Lớp 5</option>
</select><br><br>

<button onclick="start()">🚀 Vào thi</button>
<button onclick="teacher()">📊 Xem điểm</button>
`;
}

// ================= NGÂN HÀNG CHUẨN DOC =================
const bank={

3:[
{
q:"Khi mở ổ đĩa, em có thể nhìn thấy những gì?",
a:["A. Các thư mục","B. Âm thanh","C. Video"],
c:"A"
},
{
q:"Đâu là biểu tượng của phần mềm trình chiếu PowerPoint?",
a:["A. PPT","B. Word","C. Excel"],
c:"A"
},
{
q:"Theo em để khởi động phần mềm ta làm gì?",
a:["A. Nháy đúp chuột","B. Kéo chuột","C. Nhấn giữ"],
c:"A"
},
{
q:"Máy tính giúp em làm gì?",
a:["A. Học tập","B. Ngủ","C. Ăn"],
c:"A"
}
],

4:[
{
q:"Đâu là biểu tượng của phần mềm PowerPoint?",
a:["A. PPT","B. Excel","C. Word","D. Paint"],
c:"A"
},
{
q:"Để thay đổi hình ảnh sân khấu trong Scratch ta chọn gì?",
a:["A. Background","B. Sound","C. Code","D. File"],
c:"A"
},
{
q:"Lệnh xoay phải 90 độ là gì?",
a:["A. Turn 90","B. Move","C. Say","D. Wait"],
c:"A"
},
{
q:"Nhân vật trong Scratch là gì?",
a:["A. Con mèo","B. Con cá","C. Con thỏ","D. Con chó"],
c:"A"
}
],

5:[
{
q:"Cấu trúc tuần tự là gì?",
a:["A. Thực hiện theo thứ tự","B. Lặp","C. Rẽ nhánh"],
c:"A"
},
{
q:"Cấu trúc rẽ nhánh là gì?",
a:["A. If...then","B. Repeat","C. Move"],
c:"A"
},
{
q:"Chạy thử chương trình để làm gì?",
a:["A. Kiểm tra lỗi","B. Trang trí","C. Xóa"],
c:"A"
},
{
q:"Đổi tên thư mục bằng cách nào?",
a:["A. Rename","B. Delete","C. Copy"],
c:"A"
}
]

};

// ================= THI =================
function start(){

let name=document.getElementById("name").value;
let grade=document.getElementById("grade").value;

localStorage.setItem("name",name);
localStorage.setItem("grade",grade);

let q=bank[grade].sort(()=>Math.random()-0.5);

let html=`<h2>📝 Bài thi lớp ${grade}</h2>
<p id="timer">⏰ 35:00</p>`;

// ===== TRẮC NGHIỆM =====
q.forEach((item,i)=>{
html+=`<div class="question">
<p><b>Câu ${i+1}:</b> ${item.q}</p>`;
item.a.forEach(op=>{
html+=`<input type="radio" name="q${i}" value="${op[0]}"> ${op}<br>`;
});
html+=`</div>`;
});

// ===== THỰC HÀNH CHUẨN ĐỀ =====
if(grade==3){
html+=`
<h3>🛠 PHẦN THỰC HÀNH</h3>

<b>Yêu cầu:</b> Tạo bài trình chiếu giới thiệu bản thân và hoa phượng

<ul>
<li>📁 B1: Mở This PC → vào ổ D → tạo thư mục (Tên_Lớp)</li>
<li>📊 B2: Mở PowerPoint</li>
<li>📄 B3: Tạo slide 1 → nhập thông tin bản thân</li>
<li>📄 B4: Tạo slide 2 → giới thiệu hoa phượng</li>
<li>🖼 B5: Chèn hình ảnh minh họa</li>
<li>🔤 B6: Chọn font Arial</li>
<li>📐 B7: Sắp xếp nội dung rõ ràng</li>
<li>💾 B8: Lưu file tên: Gioithieubanthan</li>
</ul>`;
}

if(grade==4){
html+=`
<h3>🛠 PHẦN THỰC HÀNH</h3>

<b>Bài 1: Scratch</b>
<ul>
<li>📁 Tạo thư mục Tên_Lớp_kiểm tra</li>
<li>🎮 Mở Scratch</li>
<li>🚩 Khi bấm cờ xanh</li>
<li>➡ Di chuyển 1 giây đến vị trí ngẫu nhiên</li>
<li>💬 Nói "Xin chào các bạn!" (2 giây)</li>
<li>⏸ Dừng 1 giây</li>
<li>💬 Nói "Ở đây vui quá!"</li>
</ul>

<b>Bài 2: PowerPoint</b>
<ul>
<li>📊 Tạo 3 slide giới thiệu hoa</li>
<li>🖼 Chèn hình ảnh</li>
<li>✨ Thêm hiệu ứng</li>
<li>💾 Lưu file</li>
</ul>`;
}

if(grade==5){
html+=`
<h3>🛠 PHẦN THỰC HÀNH</h3>

<ul>
<li>📁 Tạo thư mục Tên_Lớp5</li>
<li>🎮 Scratch: nói + di chuyển + xoay</li>
<li>📐 Tính diện tích hình vuông: S = a × a</li>
</ul>

<h3>🧠 TỰ LUẬN</h3>
<p>Tại sao cần chạy thử chương trình?</p>
<textarea id="essay" style="width:100%;height:80px"></textarea>
`;
}

html+=`
<br><input type="file"><br><br>
<button onclick="submit()">🚀 Nộp bài</button>
<p id="result"></p>
`;

document.getElementById("app").innerHTML=html;

// TIMER
let t=35*60;
setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerHTML=`⏰ ${m}:${s}`;
t--;
},1000);

window.q=q;
}

// ================= CHẤM =================
function submit(){

let score=0;

window.q.forEach((item,i)=>{
let c=document.querySelector(`input[name="q${i}"]:checked`);
if(c && c.value==item.c) score++;
});

let essay=document.getElementById("essay")?.value||"";
let essayScore=essay.length>20?2:0;

let total=score+essayScore;

let data=JSON.parse(localStorage.getItem("data")||"[]");

data.push({
name:localStorage.getItem("name"),
grade:localStorage.getItem("grade"),
total
});

localStorage.setItem("data",JSON.stringify(data));

document.getElementById("result").innerHTML="🎉 Điểm: "+total;
}

// ================= GIÁO VIÊN =================
function teacher(){

let data=JSON.parse(localStorage.getItem("data")||"[]");

let html="<h2>Bảng điểm</h2><table border=1 width=100%>";

data.forEach(s=>{
html+=`<tr><td>${s.name}</td><td>${s.grade}</td><td>${s.total}</td></tr>`;
});

html+="</table><button onclick='login()'>Quay lại</button>";

document.getElementById("app").innerHTML=html;
}

// START
login();

</script>

</body>
</html>
